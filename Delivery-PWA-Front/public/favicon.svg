<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#80a3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2550e6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#152f8c" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background Circle with Gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)" filter="url(#shadow)" />
  
  <!-- Graduation Cap (University Motif) -->
  <path d="M256 120 L400 180 L256 240 L112 180 Z" fill="#ffffff" />
  <path d="M160 200 L160 280 C160 310 200 330 256 330 C312 330 352 310 352 280 L352 200" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M368 185 L368 290 C368 300 376 308 384 308 C392 308 400 300 400 290 L400 185" fill="none" stroke="#ffaa4d" stroke-width="10" stroke-linecap="round" />
  <circle cx="400" cy="300" r="10" fill="#ffaa4d" />
  
  <!-- Fast Food/Delivery Motifs (Fork & Spoon overlayed inside a small secondary circle, or a fast delivery bike) -->
  <g transform="translate(196, 220) scale(0.25)" fill="#ffaa4d" filter="url(#shadow)">
    <!-- Plate & Fork/Spoon -->
    <path d="M240 50 A190 190 0 1 0 240 430 A190 190 0 1 0 240 50 Z" fill="#ffffff" opacity="0.9"/>
    <!-- Fork -->
    <path d="M170 120 L170 240 C170 260 185 270 200 270 L200 380 C200 390 208 398 218 398 C228 398 236 390 236 380 L236 270 C251 270 266 260 266 240 L266 120 C266 110 258 102 248 102 C238 102 230 110 230 120 L230 200 L218 200 L218 120 C218 110 210 102 200 102 C190 102 182 110 182 120 L182 200 L170 200 L170 120 Z" fill="#2550e6" />
    <!-- Knife/Spoon -->
    <path d="M280 120 C280 190 320 200 320 250 L320 380 C320 390 312 398 302 398 C292 398 284 390 284 380 L284 250 C284 200 280 190 280 120 C280 110 288 102 298 102 C308 102 316 110 316 120 Z" fill="#2550e6" />
  </g>
</svg>