# Server Configuration
server.port=8002

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/unibites_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:unibites_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:unibites_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable CORS or generic headers if necessary
spring.main.allow-bean-definition-overriding=true
