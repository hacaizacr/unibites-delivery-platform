user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        # Frontend PWA Static Files Proxy
        location / {
            proxy_pass http://unibites-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Python Core API (FastAPI) Gateway Routing (maps /api/v1/ to /api/ internally)
        location /api/v1/ {
            rewrite ^/api/v1/(.*)$ /api/$1 break;
            proxy_pass http://api-python-core:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Go Chat WebSocket Gateway Routing (maps /chat/ws/ to /ws/ chat handler)
        location /chat/ws/ {
            rewrite ^/chat/ws/(.*)$ /ws/$1 break;
            proxy_pass http://api-go-chat:8003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Go Chat HTTP API Gateway Routing (maps /api/chat/ to Go history logs)
        location /api/chat/ {
            proxy_pass http://api-go-chat:8003/api/chat/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Healthcheck Nginx
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
        }
    }
}
