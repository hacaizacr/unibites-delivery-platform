user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # HTTP Server (Port 80) - Redirects to HTTPS and allows Let's Encrypt validation
    server {
        listen 80;
        server_name unibites.duckdns.org;

        # Certbot Let's Encrypt validation
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server (Port 443) - SSL Configuration
    server {
        listen 443 ssl;
        server_name unibites.duckdns.org;

        # Let's Encrypt SSL Certificates
        ssl_certificate /etc/letsencrypt/live/unibites.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/unibites.duckdns.org/privkey.pem;

        # SSL Security Hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Frontend PWA Static Files Proxy
        location / {
            proxy_pass http://unibites-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Python Core API (FastAPI) Gateway Routing (maps /api/ directly)
        location /api/ {
            proxy_pass http://api-python-core:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Go Chat WebSocket Gateway Routing (maps /chat/ws/ to /ws/ chat handler)
        location /chat/ws/ {
            rewrite ^/chat/ws/(.*)$ /ws/$1 break;
            proxy_pass http://api-go-chat:8003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Go Chat HTTP API Gateway Routing (maps /api/chat/ to Go history logs)
        location /api/chat/ {
            proxy_pass http://api-go-chat:8003/api/chat/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Healthcheck Nginx
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
        }
    }
}
